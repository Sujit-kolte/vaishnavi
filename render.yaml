services:
  - type: web
    name: smart-resume-builder-backend
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        scope: run
        # Set this in Render dashboard to your Vercel frontend URL
      - key: SUPABASE_URL
        scope: run
      - key: SUPABASE_ANON_KEY
        scope: run
      - key: OPENAI_API_KEY
        scope: run
